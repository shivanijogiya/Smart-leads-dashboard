services:
  mongo:
    image: mongo:7
    container_name: smart-leads-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server
    container_name: smart-leads-api
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/smart-leads
      JWT_SECRET: replace-with-a-long-random-secret
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      CLIENT_URL: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    container_name: smart-leads-client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  mongo-data:
